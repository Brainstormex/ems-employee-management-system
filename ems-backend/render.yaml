# Optional Render Blueprint — connect this repo in the Render dashboard
# and apply, or create the services manually using the README steps.
#
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: ems-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    # Migrations run automatically at container start via docker-entrypoint.sh
    # (npx prisma migrate deploy && node dist/index.js)
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: DATABASE_URL
        fromDatabase:
          name: ems-postgres
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        sync: false
      - key: COOKIE_SECURE
        value: "true"

databases:
  - name: ems-postgres
    plan: free
    databaseName: ems_db
    user: ems
